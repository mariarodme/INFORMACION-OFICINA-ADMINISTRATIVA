<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Oficina</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600&family=Google+Sans+Display:wght@400;500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;
  --sidebar-bg:#f9f9ff;
  --white:#ffffff;
  --border:#e3e8f7;
  --border-soft:#eef1fa;
  --text:#1c1f26;
  --text2:#5f6577;
  --text3:#9aa0b4;
  --blue:#4f72e3;
  --blue-lt:#e8eeff;
  --green:#10b981;
  --gbg:#ecfdf5;
  --amber:#f59e0b;
  --abg:#fffbeb;
  --red:#ef4444;
  --rbg:#fef2f2;
  --purple:#8b5cf6;
  --pink:#ec4899;
  --grad-text:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(79,114,227,.12);
  --sb-w:256px;
  --sb-collapsed:64px;
  --r:14px;--r2:18px;
  --fh:'Google Sans',sans-serif;--fb:'Roboto',sans-serif;
  --transition:.25s cubic-bezier(.4,0,.2,1);
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:100vh}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:var(--sb-w);
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:12px 8px;
  position:fixed;top:0;left:0;height:100vh;
  overflow:hidden;z-index:50;
  transition:width var(--transition);
  will-change:width;
}
.sidebar.collapsed{width:var(--sb-collapsed)}
@media(max-width:768px){.sidebar{display:none}}

/* SIDEBAR HEADER */
.sb-header{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 16px;flex-shrink:0;min-width:0}
.sb-logo{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden;flex:1}
.sb-logo-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.sb-logo-icon svg{width:15px;height:15px}
.sb-logo-text{font-family:var(--fh);font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;transition:opacity var(--transition),max-width var(--transition);max-width:160px;opacity:1}
.sidebar.collapsed .sb-logo-text{max-width:0;opacity:0}
.sidebar.collapsed .sb-logo{cursor:pointer}

/* TOGGLE BTN */
.toggle-btn{
  width:32px;height:32px;border-radius:8px;border:none;
  background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);flex-shrink:0;
  transition:background .15s,color .15s,transform var(--transition);
}
.toggle-btn:hover{background:rgba(79,114,227,.1);color:var(--blue)}
.sidebar.collapsed .toggle-btn{transform:rotate(180deg)}
.toggle-btn svg{width:18px;height:18px;transition:none}

/* NAV ITEMS */
.sb-section{margin-bottom:4px;min-width:0}
.sb-label{
  font-size:10px;font-weight:500;color:var(--text3);
  letter-spacing:.07em;text-transform:uppercase;
  padding:6px 12px 4px;display:block;
  white-space:nowrap;overflow:hidden;
  transition:opacity var(--transition),max-height var(--transition);
  opacity:1;max-height:30px;
}
.sidebar.collapsed .sb-label{opacity:0;max-height:0;padding-top:0;padding-bottom:0}

.nb{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;cursor:pointer;
  color:var(--text2);font-size:13.5px;font-weight:400;
  border:none;background:none;width:100%;text-align:left;
  border-radius:24px;transition:background .15s,color .15s;
  font-family:var(--fh);white-space:nowrap;overflow:hidden;
  min-width:0;position:relative;
}
.nb:hover{background:rgba(79,114,227,.08);color:var(--text)}
.nb.active{background:var(--blue-lt);color:var(--blue);font-weight:500}
.nb-icon{width:18px;height:18px;flex-shrink:0;opacity:.6;transition:opacity .15s}
.nb.active .nb-icon,.nb:hover .nb-icon{opacity:1}
.nb-label{overflow:hidden;transition:opacity var(--transition),max-width var(--transition);max-width:180px;opacity:1}
.sidebar.collapsed .nb-label{max-width:0;opacity:0}
.nb-badge{
  margin-left:auto;font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:20px;
  background:var(--blue-lt);color:var(--blue);flex-shrink:0;
  transition:opacity var(--transition);
}
.nb-badge.g{background:var(--gbg);color:var(--green)}
.nb-badge.a{background:var(--abg);color:var(--amber)}
.sidebar.collapsed .nb-badge{opacity:0;pointer-events:none}

/* Tooltip on collapsed */
.sidebar.collapsed .nb{position:relative}
.sidebar.collapsed .nb:hover::after{
  content:attr(data-label);
  position:absolute;left:calc(var(--sb-collapsed) - 4px);top:50%;
  transform:translateY(-50%);
  background:var(--text);color:#fff;
  font-size:12px;font-family:var(--fh);
  padding:5px 10px;border-radius:8px;
  white-space:nowrap;z-index:100;
  pointer-events:none;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.sb-div{height:1px;background:var(--border-soft);margin:8px 6px;transition:margin var(--transition)}

/* Cat items */
.cat-wrap{display:flex;align-items:center;border-radius:24px;transition:background .15s;min-width:0;overflow:hidden}
.cat-wrap:hover{background:rgba(79,114,227,.08)}
.cat-wrap:hover .cat-edit{opacity:1}
.cat-wrap.active{background:var(--blue-lt)}
.cat-btn{
  flex:1;display:flex;align-items:center;gap:10px;
  padding:9px 12px;cursor:pointer;color:var(--text2);
  font-size:12.5px;font-weight:400;border:none;background:none;
  text-align:left;font-family:var(--fh);transition:color .15s;
  min-width:0;white-space:nowrap;overflow:hidden;
}
.cat-wrap.active .cat-btn{color:var(--blue);font-weight:500}
.cat-btn-label{overflow:hidden;transition:opacity var(--transition),max-width var(--transition);max-width:160px;opacity:1;text-overflow:ellipsis;white-space:nowrap;display:block}
.sidebar.collapsed .cat-btn-label{max-width:0;opacity:0}
.cat-edit{opacity:0;background:none;border:none;cursor:pointer;padding:8px 8px;color:var(--text3);transition:opacity .15s,color .15s;border-radius:0 24px 24px 0;flex-shrink:0}
.cat-edit:hover{color:var(--blue)}
.sidebar.collapsed .cat-edit{display:none}

/* ═══ MAIN ═══ */
.main{
  flex:1;
  margin-left:var(--sb-w);
  display:flex;flex-direction:column;min-height:100vh;
  transition:margin-left var(--transition);
}
.main.sb-collapsed{margin-left:var(--sb-collapsed)}
@media(max-width:768px){.main{margin-left:0!important}}

/* MOBILE TOPBAR */
.mob-topbar{display:none;background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:40;box-shadow:var(--shadow)}
@media(max-width:768px){.mob-topbar{display:flex}}
.mob-menu-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--text2);border-radius:8px}
.mob-menu-btn:hover{background:var(--blue-lt);color:var(--blue)}

/* ═══ CONTENT ═══ */
.content{flex:1;overflow-y:auto}
.panel{display:none;animation:fi .2s ease}
.panel.on{display:flex;flex-direction:column}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ═══ HOME ═══ */
#panel-overview{align-items:stretch}
.home-top{padding:52px 40px 24px;display:flex;flex-direction:column;align-items:center;text-align:center}
@media(max-width:600px){.home-top{padding:32px 20px 20px}}
.home-greeting{font-family:'Google Sans Display',sans-serif;font-size:40px;font-weight:400;letter-spacing:-.03em;line-height:1.2;margin-bottom:6px}
.home-greeting .grad{background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:15px;color:var(--text2);font-weight:300;margin-bottom:32px}
.stat-pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.stat-pill{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;font-family:var(--fh)}
.stat-pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.stat-pill b{color:var(--text);font-weight:600}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0}
.sdot.g{background:var(--green)}.sdot.a{background:var(--amber)}.sdot.p{background:var(--purple)}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:0 40px 28px;width:100%;max-width:960px;margin:0 auto}
@media(max-width:600px){.quick-grid{padding:0 16px 20px;grid-template-columns:1fr 1fr}}
.qcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.qcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:transparent}
.qcard-accent{position:absolute;top:0;left:0;right:0;height:3px}
.qcard-accent.blue{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.qcard-accent.green{background:linear-gradient(90deg,#10b981,#34d399)}
.qcard-accent.amber{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.qcard-accent.pink{background:linear-gradient(90deg,#ec4899,#f43f5e)}
.qcard-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.qcard-num{font-family:'Google Sans Display',sans-serif;font-size:36px;font-weight:400;letter-spacing:-.04em;line-height:1;margin-bottom:4px}
.qcard-num.blue{color:#6366f1}.qcard-num.green{color:var(--green)}.qcard-num.amber{color:var(--amber)}.qcard-num.pink{color:#ec4899}
.qcard-desc{font-size:12px;color:var(--text3);font-weight:300}
.home-lists{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 40px 40px;width:100%;max-width:960px;margin:0 auto}
@media(max-width:600px){.home-lists{grid-template-columns:1fr;padding:0 16px 28px}}
.hlist-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--shadow)}
.hlist-title{font-family:var(--fh);font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.hlist-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
.hlist-row:last-child{border-bottom:none}
.hlist-ev{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
.hlist-ev:last-child{border-bottom:none}
.evbar{width:3px;min-height:28px;border-radius:3px;flex-shrink:0;margin-top:2px;background:var(--blue)}
.evbar.g{background:var(--green)}.evbar.a{background:var(--amber)}

/* INNER PANELS */
.inner-panel{padding:32px 40px;max-width:900px;width:100%}
@media(max-width:600px){.inner-panel{padding:20px 16px}}
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.ptitle{font-family:'Google Sans Display',sans-serif;font-size:24px;font-weight:400;letter-spacing:-.03em;color:var(--text)}
.psubtitle{font-size:12px;color:var(--text3);margin-top:3px}
.phdr-right{display:flex;gap:8px;flex-wrap:wrap}

/* BUTTONS */
.btn{font-family:var(--fh);font-size:13px;font-weight:500;border-radius:20px;padding:8px 16px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);display:inline-flex;align-items:center;gap:7px;transition:all .15s;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 10px rgba(79,114,227,.3)}
.btn.primary:hover{background:#3d5fd1}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.ghost{border-color:transparent;background:none;box-shadow:none;color:var(--text2)}
.btn.ghost:hover{background:rgba(79,114,227,.08);color:var(--blue)}
.btn.dg{border-color:transparent;background:none;box-shadow:none;color:var(--text3)}
.btn.dg:hover{color:var(--red);background:var(--rbg)}
.btn.soft{background:var(--blue-lt);color:var(--blue);border-color:transparent;box-shadow:none}
.btn.soft:hover{background:#dde8fe}

/* INPUTS */
input[type=text],textarea,select{font-family:var(--fb);font-size:13px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:10px 14px;outline:none;width:100%;transition:border-color .18s,box-shadow .18s;box-shadow:var(--shadow)}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,114,227,.1)}
textarea{resize:vertical;min-height:80px;line-height:1.7}
select option{background:var(--white)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.01em}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow)}

/* CATEGORY PANEL */
.subcat-block{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.subcat-hdr{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--border-soft)}
.subcat-name{font-family:var(--fh);font-size:14px;font-weight:500;color:var(--text);flex:1}
.subcat-count{font-size:11px;color:var(--text3);background:var(--bg);padding:2px 9px;border-radius:20px;border:1px solid var(--border-soft)}
.subcat-name-input{font-family:var(--fh);font-size:14px;font-weight:500;flex:1;background:var(--bg);border:1px solid var(--blue);border-radius:8px;padding:4px 9px;outline:none;color:var(--text)}
.msgrow{display:flex;align-items:stretch;border-bottom:1px solid var(--border-soft);transition:background .13s}
.msgrow:last-child{border-bottom:none}
.msgrow:hover{background:#f8f9ff}
.msgrow-left{flex:1;padding:13px 16px;min-width:0}
.msgrow-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.msgrow-text{font-size:12.5px;color:var(--text2);line-height:1.65;white-space:pre-wrap;font-weight:300}
.msgrow-actions{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 12px;background:var(--bg);border-left:1px solid var(--border-soft);flex-shrink:0}
.copybtn{font-size:11.5px;font-weight:500;padding:6px 14px;border-radius:20px;background:var(--blue);color:#fff;border:none;cursor:pointer;transition:all .14s;white-space:nowrap;box-shadow:0 1px 6px rgba(79,114,227,.25)}
.copybtn:hover{background:#3d5fd1}
.copybtn.ok{background:var(--green)}
.subcat-footer{padding:10px 16px;background:var(--bg);border-top:1px solid var(--border-soft)}
.empty-cat{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* NOTAS */
.ngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.ncard{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:15px;border-top:2.5px solid var(--blue);box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.ncard.green{border-top-color:var(--green)}.ncard.amber{border-top-color:var(--amber)}
.ncard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.ntop{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.ntag{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--blue-lt);color:var(--blue)}
.ntag.green{background:var(--gbg);color:var(--green)}.ntag.amber{background:var(--abg);color:var(--amber)}
.ntitle{font-family:var(--fh);font-size:14px;font-weight:500;background:none;border:none;color:var(--text);width:100%;outline:none;margin-bottom:7px}
.nbody{font-size:13px;line-height:1.65;background:none;border:none;color:var(--text2);width:100%;outline:none;resize:none;min-height:56px;font-family:var(--fb);font-weight:300}
.nfoot{margin-top:10px;font-size:11px;color:var(--text3)}

/* TAREAS */
.tform{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tform input{flex:1;min-width:150px}
.tform select{width:130px}
.tsec{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.tsec::after{content:'';flex:1;height:1px;background:var(--border-soft)}
.tgroup{margin-bottom:20px}
.titem{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:12px;border:1px solid transparent;transition:all .13s}
.titem:hover{background:var(--white);border-color:var(--border);box-shadow:var(--shadow)}
.titem.done .ttxt{text-decoration:line-through;color:var(--text3)}
.chk{width:18px;height:18px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .13s;background:var(--white)}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:'✓';font-size:11px;color:#fff;font-weight:600}
.ttxt{flex:1;font-size:13.5px;line-height:1.5;outline:none}
.ttxt:focus{border-bottom:1px dashed var(--border)}
.pri{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0;margin-top:2px}
.pri.alta{background:var(--rbg);color:var(--red)}.pri.media{background:var(--abg);color:var(--amber)}.pri.baja{background:var(--gbg);color:var(--green)}

/* CALENDARIO */
.caltwo{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
@media(max-width:600px){.caltwo{grid-template-columns:1fr}}
.calhdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.calhdr h3{font-family:var(--fh);font-size:17px;font-weight:400;color:var(--text);flex:1;letter-spacing:-.02em}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cdn{text-align:center;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:6px 0}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:1px solid transparent;font-size:12px;position:relative;transition:all .13s;color:var(--text2)}
.cd:hover{background:var(--blue-lt);color:var(--blue)}
.cd.today{background:var(--blue);color:#fff;font-weight:600}
.cd.om{color:var(--border)}
.cd.has::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cd.sel{background:var(--blue-lt);border-color:rgba(79,114,227,.3);color:var(--blue);font-weight:500}
.cd.today.sel{background:var(--blue);color:#fff}
.evcard{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:12px;background:var(--white);border:1px solid var(--border);margin-bottom:8px;box-shadow:var(--shadow)}
.evpill{width:3px;min-height:30px;border-radius:3px;background:var(--blue);flex-shrink:0}
.evpill.g{background:var(--green)}.evpill.a{background:var(--amber)}
.evtitle{font-size:13px;font-weight:500;color:var(--text)}
.evtime{font-size:11px;color:var(--text3);margin-top:2px}
.evform{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.evform .row{display:flex;gap:8px;margin-bottom:8px}
.evform .row:last-child{margin-bottom:0}
.rsubttl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}

/* TABLAS */
.tblblock{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.tblhdr{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:1px solid var(--border-soft)}
.tblname{font-family:var(--fh);font-size:14px;font-weight:500;color:var(--text);background:none;border:none;outline:none;flex:1}
.tblname:focus{border-bottom:1px solid var(--blue)}
.tblwrap{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse}
.dt th{background:var(--bg);color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:9px 13px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border-soft)}
.dt td{padding:9px 13px;border-bottom:1px solid var(--border-soft);font-size:13px}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#f8f9ff}
.dt td input{background:none;border:none;color:var(--text);width:100%;outline:none;padding:0;font-size:13px;font-family:var(--fb)}
.dt td input:focus{border-bottom:1px solid var(--blue)}
.tblfoot{padding:9px 14px;border-top:1px solid var(--border-soft);background:var(--bg)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(15,20,40,.25);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mobox{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:26px 28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(79,114,227,.15),0 4px 20px rgba(0,0,0,.08)}
.mobox h3{font-family:'Google Sans Display',sans-serif;font-size:18px;font-weight:400;color:var(--text);margin-bottom:18px;letter-spacing:-.02em}
.mofoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border-soft)}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;font-weight:300}

/* MOB DRAWER */
.mob-drawer{display:none;position:fixed;inset:0;z-index:100}
.mob-drawer.open{display:block}
.mob-drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,.2)}
.mob-drawer-panel{position:absolute;left:0;top:0;bottom:0;width:280px;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:16px 8px;overflow-y:auto}
</style>
</head>
<body>
<div class="layout">

<!-- ═══ SIDEBAR ═══ -->
<nav class="sidebar" id="sidebar">

  <div class="sb-header">
    <div class="sb-logo" id="sb-logo-area" onclick="handleLogoClick()">
      <div class="sb-logo-icon">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="white"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="white"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="white"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".5"/></svg>
      </div>
      <span class="sb-logo-text">
        <input id="app-title" value="Mi Oficina" maxlength="22" spellcheck="false"
          style="font-family:var(--fh);font-size:15px;font-weight:500;color:var(--text);background:none;border:none;outline:none;cursor:text;width:130px"
          onclick="event.stopPropagation()"
        />
      </span>
    </div>
    <button class="toggle-btn" id="toggle-btn" onclick="toggleSidebar()" title="Ocultar/mostrar menú">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="sb-section">
    <button class="nb active" onclick="goTab('overview')" data-label="Inicio">
      <svg class="nb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h4a1 1 0 001-1v-3h2v3a1 1 0 001 1h4a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>
      <span class="nb-label">Inicio</span>
    </button>
  </div>

  <div class="sb-div"></div>

  <div class="sb-section">
    <span class="sb-label">Herramientas</span>
    <button class="nb" onclick="goTab('tareas')" data-label="Tareas">
      <svg class="nb-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
      <span class="nb-label">Tareas</span>
      <span class="nb-badge a" id="nb-t" style="display:none">0</span>
    </button>
    <button class="nb" onclick="goTab('calendario')" data-label="Calendario">
      <svg class="nb-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
      <span class="nb-label">Calendario</span>
      <span class="nb-badge g" id="nb-e" style="display:none">0</span>
    </button>
    <button class="nb" onclick="goTab('notas')" data-label="Notas">
      <svg class="nb-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
      <span class="nb-label">Notas</span>
    </button>
    <button class="nb" onclick="goTab('tablas')" data-label="Tablas">
      <svg class="nb-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 4a3 3 0 00-3 3v6a3 3 0 003 3h10a3 3 0 003-3V7a3 3 0 00-3-3H5zm-1 9v-1h5v2H5a1 1 0 01-1-1zm7 1h4a1 1 0 001-1v-1h-5v2zm0-4h5V8h-5v2zM9 8H4v2h5V8z" clip-rule="evenodd"/></svg>
      <span class="nb-label">Tablas</span>
    </button>
  </div>

  <div class="sb-div"></div>

  <div class="sb-section">
    <span class="sb-label">Categorías</span>
    <div id="cat-nav"></div>
  </div>

</nav>

<!-- MOB TOPBAR -->
<div class="mob-topbar">
  <button class="mob-menu-btn" onclick="openDrawer()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <span style="font-family:var(--fh);font-size:15px;font-weight:500;flex:1" id="mob-title">Mi Oficina</span>
</div>

<!-- MOB DRAWER -->
<div class="mob-drawer" id="mob-drawer">
  <div class="mob-drawer-overlay" onclick="closeDrawer()"></div>
  <div class="mob-drawer-panel" id="mob-drawer-panel"></div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="content">

    <!-- HOME -->
    <div class="panel on" id="panel-overview">
      <div class="home-top">
        <div class="home-greeting">Hola, <span class="grad" id="greeting-name">bienvenida</span></div>
        <div class="home-sub" id="home-sub-date"></div>
        <div class="stat-pills" id="stat-pills"></div>
      </div>
      <div class="quick-grid" id="quick-grid"></div>
      <div class="home-lists" id="home-lists"></div>
    </div>

    <!-- TAREAS -->
    <div class="panel" id="panel-tareas">
      <div class="inner-panel">
        <div class="phdr"><div class="ptitle">Tareas</div></div>
        <div class="tform">
          <input type="text" id="task-in" placeholder="Nueva tarea — Enter para agregar..." onkeydown="if(event.key==='Enter')addTask()"/>
          <select id="task-pri"><option value="media">Media</option><option value="alta">Alta</option><option value="baja">Baja</option></select>
          <button class="btn primary" onclick="addTask()">Agregar</button>
        </div>
        <div class="tgroup"><div class="tsec">Pendientes</div><div id="tasks-p"></div></div>
        <div class="tgroup"><div class="tsec">Completadas</div><div id="tasks-d"></div></div>
      </div>
    </div>

    <!-- CALENDARIO -->
    <div class="panel" id="panel-calendario">
      <div class="inner-panel">
        <div class="phdr"><div class="ptitle">Calendario</div></div>
        <div class="caltwo">
          <div>
            <div class="calhdr">
              <button class="btn sm ghost" onclick="calNav(-1)">‹</button>
              <h3 id="cal-lbl"></h3>
              <button class="btn sm ghost" onclick="calNav(1)">›</button>
              <button class="btn sm ghost" onclick="calToday()">Hoy</button>
            </div>
            <div class="calgrid" id="calgrid"></div>
          </div>
          <div>
            <div class="evform">
              <div class="rsubttl">Agregar evento</div>
              <div class="row"><input type="text" id="ev-title" placeholder="Título..." style="flex:1"/></div>
              <div class="row">
                <input type="text" id="ev-date" placeholder="YYYY-MM-DD" style="flex:1"/>
                <input type="text" id="ev-time" placeholder="14:30" style="width:84px"/>
              </div>
              <div class="row"><button class="btn primary" style="width:100%" onclick="addEvent()">Agregar</button></div>
            </div>
            <div class="rsubttl" id="ev-day-lbl">Eventos del día</div>
            <div id="evlist" style="margin-top:9px"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- NOTAS -->
    <div class="panel" id="panel-notas">
      <div class="inner-panel">
        <div class="phdr"><div class="ptitle">Notas</div><button class="btn primary" onclick="openMo('mo-note')">+ Nueva nota</button></div>
        <div class="ngrid" id="ngrid"></div>
      </div>
    </div>

    <!-- TABLAS -->
    <div class="panel" id="panel-tablas">
      <div class="inner-panel">
        <div class="phdr"><div class="ptitle">Tablas</div><button class="btn primary" onclick="openMo('mo-tbl')">+ Nueva tabla</button></div>
        <div id="tblcont"></div>
      </div>
    </div>

    <!-- CATEGORÍA -->
    <div class="panel" id="panel-cat">
      <div class="inner-panel">
        <div class="phdr">
          <div><div class="ptitle" id="cat-ptitle">—</div><div class="psubtitle" id="cat-psub"></div></div>
          <div class="phdr-right"><button class="btn" onclick="openMo('mo-subcat')">+ Subcategoría</button></div>
        </div>
        <div id="subcats-cont"></div>
      </div>
    </div>

  </div>
</div>
</div>

<!-- MODALES -->
<div class="mo" id="mo-subcat"><div class="mobox">
  <h3>Nueva subcategoría</h3>
  <div class="field"><label>Nombre</label><input type="text" id="subcat-in" placeholder="Ej: Clientes extranjeros, Grupos..."/></div>
  <div class="mofoot"><button class="btn ghost" onclick="closeMo('mo-subcat')">Cancelar</button><button class="btn primary" onclick="saveSubcat()">Crear</button></div>
</div></div>

<div class="mo" id="mo-msg"><div class="mobox">
  <h3 id="mo-msg-h">Nuevo texto</h3>
  <div class="field"><label>Título</label><input type="text" id="msg-name-in" placeholder="Ej: Cotización estándar..."/></div>
  <div class="field"><label>Texto completo</label><textarea id="msg-text-in" style="min-height:190px" placeholder="Escribí aquí el texto que vas a copiar y pegar..."></textarea></div>
  <div class="mofoot"><button class="btn ghost" onclick="closeMo('mo-msg')">Cancelar</button><button class="btn primary" id="mo-msg-btn" onclick="saveMsg()">Guardar</button></div>
</div></div>

<div class="mo" id="mo-edit-cat"><div class="mobox">
  <h3>Editar categoría</h3>
  <div class="field"><label>Nombre</label><input type="text" id="edit-cat-in" placeholder="Nombre..."/></div>
  <div class="mofoot">
    <button class="btn dg" onclick="deleteCatFn()" style="margin-right:auto">Eliminar</button>
    <button class="btn ghost" onclick="closeMo('mo-edit-cat')">Cancelar</button>
    <button class="btn primary" onclick="saveEditCat()">Guardar</button>
  </div>
</div></div>

<div class="mo" id="mo-note"><div class="mobox">
  <h3>Nueva nota</h3>
  <div class="field"><label>Título</label><input type="text" id="note-title-in" placeholder="Título..."/></div>
  <div class="field"><label>Contenido</label><textarea id="note-body-in" placeholder="Escribe aquí..."></textarea></div>
  <div class="field"><label>Color</label><select id="note-color-in"><option value="blue">Azul</option><option value="green">Verde</option><option value="amber">Amarillo</option></select></div>
  <div class="mofoot"><button class="btn ghost" onclick="closeMo('mo-note')">Cancelar</button><button class="btn primary" onclick="saveNote()">Guardar</button></div>
</div></div>

<div class="mo" id="mo-tbl"><div class="mobox">
  <h3>Nueva tabla</h3>
  <div class="field"><label>Nombre</label><input type="text" id="tbl-name-in" placeholder="Ej: Inventario..."/></div>
  <div class="field"><label>Columnas (separadas por coma)</label><input type="text" id="tbl-cols-in" placeholder="Nombre, Cantidad, Precio, Estado"/></div>
  <div class="mofoot"><button class="btn ghost" onclick="closeMo('mo-tbl')">Cancelar</button><button class="btn primary" onclick="createTbl()">Crear</button></div>
</div></div>

<script>
const S={get(k){try{return JSON.parse(localStorage.getItem('gm2_'+k))}catch{return null}},set(k,v){localStorage.setItem('gm2_'+k,JSON.stringify(v))}};

// ── SIDEBAR TOGGLE ──
let sbCollapsed = S.get('sb_collapsed') || false;

function toggleSidebar(){
  sbCollapsed = !sbCollapsed;
  S.set('sb_collapsed', sbCollapsed);
  applySidebar();
}

function applySidebar(){
  const sb = document.getElementById('sidebar');
  const main = document.getElementById('main');
  if(sbCollapsed){
    sb.classList.add('collapsed');
    main.classList.add('sb-collapsed');
  } else {
    sb.classList.remove('collapsed');
    main.classList.remove('sb-collapsed');
  }
}

// Clicking the logo icon when collapsed expands the sidebar
function handleLogoClick(){
  if(sbCollapsed) toggleSidebar();
}

const DEFAULT_CATS=[
  {id:'c1',name:'Mensajes para cotizar transportes'},
  {id:'c2',name:'Confirmación de transporte'},
  {id:'c3',name:'Rental car'},
  {id:'c4',name:'Cotización de reservas por correos y dueños'},
  {id:'c5',name:'Rentas mensuales'},
  {id:'c6',name:'Llamadas reservas extranjeras'},
  {id:'c7',name:'Reservas tours onsite'},
  {id:'c8',name:'Mensajes para app VRBO y Airbnb'},
  {id:'c9',name:'Pagos en link reservas correos o apps'},
  {id:'c10',name:'Cancelación de reserva'},
  {id:'c11',name:'Registro oficina para saldo pendiente'},
  {id:'c12',name:'Recordatorio de reserva sin pago in hold'},
  {id:'c13',name:'Reglas — Condominio y visitas permitidas'},
  {id:'c14',name:'Check in — Reservas próximas'},
  {id:'c15',name:'Coordinar limpieza mensual condos'},
];

let cats=S.get('cats')||DEFAULT_CATS;
let subcats=S.get('subcats')||[];
let msgs=S.get('msgs')||[];
let notes=S.get('notes')||[];
let tasks=S.get('tasks')||[];
let events=S.get('events')||[];
let tables=S.get('tables')||[];
let activeCatId=null,editMsgId=null,addSubcatId=null,editCatId=null;
let calY,calM,calSel;

document.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();
  const ds=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ms=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('home-sub-date').textContent=`${ds[now.getDay()]}, ${now.getDate()} de ${ms[now.getMonth()]} ${now.getFullYear()}`;
  const ti=document.getElementById('app-title');
  const savedTitle=S.get('title')||'Mi Oficina';
  ti.value=savedTitle;document.title=savedTitle;
  document.getElementById('mob-title').textContent=savedTitle;
  ti.addEventListener('input',()=>{S.set('title',ti.value);document.title=ti.value;document.getElementById('mob-title').textContent=ti.value;});
  calY=now.getFullYear();calM=now.getMonth();calSel=now.toISOString().split('T')[0];
  applySidebar();
  buildNav();
  renderAll();
});

function buildNav(){
  document.getElementById('cat-nav').innerHTML=cats.map(c=>`
    <div class="cat-wrap${activeCatId===c.id?' active':''}" id="cnw-${c.id}">
      <button class="cat-btn" onclick="openCat('${c.id}')" data-label="${esc(c.name)}">
        <svg style="width:15px;height:15px;flex-shrink:0;opacity:.5" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
        <span class="cat-btn-label">${esc(c.name)}</span>
      </button>
      <button class="cat-edit" onclick="startEditCat('${c.id}')" title="Editar categoría">
        <svg style="width:13px;height:13px" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
      </button>
    </div>`).join('');

  // also add tooltip on collapsed cat buttons
  document.querySelectorAll('.cat-btn').forEach(btn=>{
    const label=btn.getAttribute('data-label');
    btn.addEventListener('mouseenter',()=>{
      if(!sbCollapsed)return;
      // show tooltip via CSS attr trick already handled
    });
  });

  buildMobDrawer();
}

function buildMobDrawer(){
  const p=document.getElementById('mob-drawer-panel');if(!p)return;
  p.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px 20px">
      <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="white"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="white"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="white"/></svg>
      </div>
      <span style="font-family:var(--fh);font-size:15px;font-weight:500">Mi Oficina</span>
    </div>
    <button class="nb" onclick="goTab('overview');closeDrawer()"><span class="nb-label">Inicio</span></button>
    <div style="height:1px;background:var(--border-soft);margin:8px 14px"></div>
    <span class="sb-label">Herramientas</span>
    <button class="nb" onclick="goTab('tareas');closeDrawer()"><span class="nb-label">Tareas</span></button>
    <button class="nb" onclick="goTab('calendario');closeDrawer()"><span class="nb-label">Calendario</span></button>
    <button class="nb" onclick="goTab('notas');closeDrawer()"><span class="nb-label">Notas</span></button>
    <button class="nb" onclick="goTab('tablas');closeDrawer()"><span class="nb-label">Tablas</span></button>
    <div style="height:1px;background:var(--border-soft);margin:8px 14px"></div>
    <span class="sb-label">Categorías</span>`+
    cats.map(c=>`<button class="nb" onclick="openCat('${c.id}');closeDrawer()" style="font-size:12.5px"><span class="nb-label" style="max-width:200px;opacity:1">${esc(c.name)}</span></button>`).join('');
}

function openDrawer(){document.getElementById('mob-drawer').classList.add('open');}
function closeDrawer(){document.getElementById('mob-drawer').classList.remove('open');}

function renderAll(){updBadges();renderOv();renderNotes();renderTasks();renderCal();renderTbls();}

function updBadges(){
  const p=tasks.filter(t=>!t.done).length;
  const tod=new Date().toISOString().split('T')[0];
  const te=events.filter(e=>e.date>=tod).length;
  const bt=document.getElementById('nb-t'),be=document.getElementById('nb-e');
  if(bt){bt.textContent=p;bt.style.display=p?'':'none';}
  if(be){be.textContent=te;be.style.display=te?'':'none';}
}

function goTab(t){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+t).classList.add('on');
  document.querySelectorAll('.nb,.cat-wrap').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`.nb[onclick*="goTab('${t}')"]`).forEach(b=>b.classList.add('active'));
  activeCatId=null;
  if(t==='overview')renderOv();
}

function openCat(id){
  activeCatId=id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-cat').classList.add('on');
  document.querySelectorAll('.nb,.cat-wrap').forEach(b=>b.classList.remove('active'));
  const w=document.getElementById('cnw-'+id);if(w)w.classList.add('active');
  const cat=cats.find(c=>c.id===id);
  document.getElementById('cat-ptitle').textContent=cat?cat.name:'';
  renderCatPanel();
}

function startEditCat(id){
  editCatId=id;
  const cat=cats.find(c=>c.id===id);if(!cat)return;
  document.getElementById('edit-cat-in').value=cat.name;
  openMo('mo-edit-cat');
}
function saveEditCat(){
  const name=document.getElementById('edit-cat-in').value.trim();if(!name)return;
  const cat=cats.find(c=>c.id===editCatId);
  if(cat){cat.name=name;S.set('cats',cats);}
  closeMo('mo-edit-cat');buildNav();
  if(activeCatId===editCatId){
    document.getElementById('cat-ptitle').textContent=name;
    const w=document.getElementById('cnw-'+editCatId);if(w)w.classList.add('active');
  }
  editCatId=null;
}
function deleteCatFn(){
  if(!confirm('¿Eliminar esta categoría y todo su contenido?'))return;
  const id=editCatId;
  subcats=subcats.filter(s=>s.catId!==id);
  msgs=msgs.filter(m=>m.catId!==id);
  cats=cats.filter(c=>c.id!==id);
  S.set('cats',cats);S.set('subcats',subcats);S.set('msgs',msgs);
  closeMo('mo-edit-cat');buildNav();
  if(activeCatId===id){activeCatId=null;goTab('overview');}
  editCatId=null;updBadges();
}

// OVERVIEW
function renderOv(){
  const p=tasks.filter(t=>!t.done),a=tasks.filter(t=>!t.done&&t.priority==='alta');
  const tod=new Date().toISOString().split('T')[0],te=events.filter(e=>e.date===tod);
  document.getElementById('stat-pills').innerHTML=`
    <div class="stat-pill" onclick="goTab('tareas')"><span class="sdot a"></span><b>${p.length}</b> tareas pendientes</div>
    <div class="stat-pill" onclick="goTab('calendario')"><span class="sdot g"></span><b>${te.length}</b> eventos hoy</div>
    <div class="stat-pill" onclick="goTab('notas')"><span class="sdot p"></span><b>${notes.length}</b> notas</div>
    <div class="stat-pill"><span class="sdot"></span><b>${msgs.length}</b> textos guardados</div>`;
  document.getElementById('quick-grid').innerHTML=`
    <div class="qcard" onclick="goTab('tareas')"><div class="qcard-accent blue"></div><div class="qcard-label">Tareas</div><div class="qcard-num blue">${p.length}</div><div class="qcard-desc">${a.length} de alta prioridad</div></div>
    <div class="qcard" onclick="goTab('calendario')"><div class="qcard-accent green"></div><div class="qcard-label">Eventos hoy</div><div class="qcard-num green">${te.length}</div><div class="qcard-desc">${te[0]?te[0].title:'Sin eventos hoy'}</div></div>
    <div class="qcard" onclick="goTab('notas')"><div class="qcard-accent pink"></div><div class="qcard-label">Notas</div><div class="qcard-num pink">${notes.length}</div><div class="qcard-desc">${subcats.length} subcategorías</div></div>
    <div class="qcard"><div class="qcard-accent amber"></div><div class="qcard-label">Textos</div><div class="qcard-num amber">${msgs.length}</div><div class="qcard-desc">${cats.length} categorías</div></div>`;
  const pc=['','g','a'];
  const up=events.filter(e=>e.date>=tod).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  document.getElementById('home-lists').innerHTML=`
    <div class="hlist-card">
      <div class="hlist-title">Tareas pendientes</div>
      ${p.slice(0,6).map(t=>`<div class="hlist-row"><span class="pri ${t.priority}">${t.priority.toUpperCase()}</span><span style="font-size:13px;margin-left:4px">${esc(t.text)}</span></div>`).join('')||'<div style="color:var(--text3);font-size:13px;padding:4px 0">Sin tareas pendientes</div>'}
    </div>
    <div class="hlist-card">
      <div class="hlist-title">Próximos eventos</div>
      ${up.map((e,i)=>`<div class="hlist-ev"><div class="evbar ${pc[i%3]}"></div><div><div style="font-size:13px;font-weight:500">${esc(e.title)}</div><div style="font-size:11px;color:var(--text3);margin-top:1px">${e.date}${e.time?' · '+e.time:''}</div></div></div>`).join('')||'<div style="color:var(--text3);font-size:13px;padding:4px 0">Sin eventos próximos</div>'}
    </div>`;
}

// CATEGORÍA
function renderCatPanel(){
  if(!activeCatId)return;
  const subs=subcats.filter(s=>s.catId===activeCatId);
  const total=msgs.filter(m=>m.catId===activeCatId).length;
  document.getElementById('cat-psub').textContent=subs.length?`${subs.length} subcategoría${subs.length!==1?'s':''} · ${total} texto${total!==1?'s':''}`:' ';
  const cont=document.getElementById('subcats-cont');
  if(!subs.length){cont.innerHTML=`<div class="empty-cat"><p style="font-size:15px;color:var(--text2);margin-bottom:6px">Sin subcategorías todavía</p><p>Presioná <b style="color:var(--blue)">+ Subcategoría</b> para empezar</p></div>`;return;}
  cont.innerHTML=subs.map(sub=>{
    const m=msgs.filter(m=>m.subcatId===sub.id);
    return `<div class="subcat-block">
      <div class="subcat-hdr">
        <span class="subcat-name" id="sn-${sub.id}">${esc(sub.name)}</span>
        <span class="subcat-count">${m.length} texto${m.length!==1?'s':''}</span>
        <button class="btn sm soft" onclick="renameSubcat('${sub.id}')" style="font-size:11px;padding:4px 11px">Renombrar</button>
        <button class="btn sm dg" onclick="delSubcat('${sub.id}')" style="font-size:11px;padding:4px 8px">×</button>
      </div>
      <div>
        ${m.length?m.map(msg=>`<div class="msgrow">
          <div class="msgrow-left">
            <div class="msgrow-name">${esc(msg.name)}</div>
            <div class="msgrow-text">${esc(msg.text)}</div>
          </div>
          <div class="msgrow-actions">
            <button class="copybtn" id="cb-${msg.id}" onclick="copyMsg('${msg.id}')">Copiar</button>
            <button class="btn sm soft" onclick="editMsg('${msg.id}')" style="font-size:11px;padding:4px 10px">Editar</button>
            <button class="btn sm dg" onclick="delMsg('${msg.id}')" style="font-size:11px">×</button>
          </div>
        </div>`).join(''):'<div style="padding:13px 16px;color:var(--text3);font-size:13px;font-weight:300">Sin textos aún.</div>'}
      </div>
      <div class="subcat-footer"><button class="btn sm primary" onclick="openAddMsg('${sub.id}')">+ Agregar texto</button></div>
    </div>`;
  }).join('');
}

function renameSubcat(id){const sub=subcats.find(s=>s.id===id);if(!sub)return;const el=document.getElementById('sn-'+id);if(!el)return;const inp=document.createElement('input');inp.className='subcat-name-input';inp.value=sub.name;inp.onblur=()=>{const v=inp.value.trim();if(v){sub.name=v;S.set('subcats',subcats);}renderCatPanel();};inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=sub.name;inp.blur();}};el.replaceWith(inp);inp.focus();inp.select();}
function delSubcat(id){if(!confirm('¿Eliminar?'))return;subcats=subcats.filter(s=>s.id!==id);msgs=msgs.filter(m=>m.subcatId!==id);S.set('subcats',subcats);S.set('msgs',msgs);renderCatPanel();updBadges();}
function openAddMsg(sid){addSubcatId=sid;editMsgId=null;document.getElementById('mo-msg-h').textContent='Agregar texto';document.getElementById('mo-msg-btn').textContent='Guardar';document.getElementById('msg-name-in').value='';document.getElementById('msg-text-in').value='';openMo('mo-msg');}
function editMsg(id){const msg=msgs.find(m=>m.id===id);if(!msg)return;editMsgId=id;addSubcatId=msg.subcatId;document.getElementById('mo-msg-h').textContent='Editar texto';document.getElementById('mo-msg-btn').textContent='Guardar cambios';document.getElementById('msg-name-in').value=msg.name;document.getElementById('msg-text-in').value=msg.text;openMo('mo-msg');}
function saveMsg(){const name=document.getElementById('msg-name-in').value.trim(),text=document.getElementById('msg-text-in').value.trim();if(!name&&!text)return;if(editMsgId){const msg=msgs.find(m=>m.id===editMsgId);if(msg){msg.name=name||msg.name;msg.text=text;}}else{if(!addSubcatId)return;msgs.push({id:'m'+Date.now(),subcatId:addSubcatId,catId:activeCatId,name:name||'Sin título',text,date:new Date().toLocaleDateString('es-CR')});}S.set('msgs',msgs);closeMo('mo-msg');editMsgId=null;addSubcatId=null;renderCatPanel();updBadges();}
function copyMsg(id){const msg=msgs.find(m=>m.id===id);if(!msg)return;navigator.clipboard.writeText(msg.text).then(()=>{const btn=document.getElementById('cb-'+id);if(btn){btn.textContent='¡Copiado!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('ok')},1800);}});}
function delMsg(id){if(!confirm('¿Eliminar?'))return;msgs=msgs.filter(m=>m.id!==id);S.set('msgs',msgs);renderCatPanel();updBadges();}
function saveSubcat(){const name=document.getElementById('subcat-in').value.trim();if(!name||!activeCatId)return;subcats.push({id:'s'+Date.now(),catId:activeCatId,name});S.set('subcats',subcats);closeMo('mo-subcat');document.getElementById('subcat-in').value='';renderCatPanel();}

// NOTAS
function renderNotes(){const g=document.getElementById('ngrid');if(!notes.length){g.innerHTML='<div style="grid-column:1/-1" class="empty">Sin notas.</div>';return;}g.innerHTML=notes.map((n,i)=>`<div class="ncard ${n.color||'blue'}"><div class="ntop"><span class="ntag ${n.color||'blue'}">${n.color==='green'?'Info':n.color==='amber'?'Importante':'General'}</span><button class="btn dg sm" style="padding:2px 7px" onclick="delNote(${i})">×</button></div><input class="ntitle" value="${esc(n.title)}" placeholder="Título..." onchange="notes[${i}].title=this.value;S.set('notes',notes)"/><textarea class="nbody" placeholder="Contenido..." onchange="notes[${i}].body=this.value;S.set('notes',notes)">${esc(n.body)}</textarea><div class="nfoot">${n.date}</div></div>`).join('');}
function saveNote(){const t=document.getElementById('note-title-in').value.trim(),b=document.getElementById('note-body-in').value.trim(),c=document.getElementById('note-color-in').value;if(!t&&!b)return;notes.unshift({title:t||'Sin título',body:b,color:c,date:new Date().toLocaleDateString('es-CR')});S.set('notes',notes);closeMo('mo-note');document.getElementById('note-title-in').value='';document.getElementById('note-body-in').value='';renderNotes();}
function delNote(i){if(!confirm('¿Eliminar?'))return;notes.splice(i,1);S.set('notes',notes);renderNotes();}

// TAREAS
function renderTasks(){const p=tasks.filter(t=>!t.done),d=tasks.filter(t=>t.done);document.getElementById('tasks-p').innerHTML=p.length?p.map(tHTML).join(''):'<div style="color:var(--text3);font-size:13px;padding:7px 2px">Sin tareas pendientes</div>';document.getElementById('tasks-d').innerHTML=d.length?d.map(tHTML).join(''):'<div style="color:var(--text3);font-size:13px;padding:7px 2px">Ninguna completada</div>';updBadges();}
function tHTML(t){return `<div class="titem${t.done?' done':''}"><div class="chk${t.done?' on':''}" onclick="toggleT('${t.id}')"></div><div class="ttxt" contenteditable="true" onblur="editT('${t.id}',this.innerText)">${esc(t.text)}</div><span class="pri ${t.priority}">${t.priority.toUpperCase()}</span><button class="btn dg sm" style="padding:3px 7px" onclick="delT('${t.id}')">×</button></div>`;}
function addTask(){const inp=document.getElementById('task-in'),pri=document.getElementById('task-pri').value,text=inp.value.trim();if(!text)return;tasks.push({id:'t'+Date.now(),text,priority:pri,done:false});S.set('tasks',tasks);inp.value='';renderTasks();}
function toggleT(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;S.set('tasks',tasks);renderTasks();}}
function delT(id){tasks=tasks.filter(t=>t.id!==id);S.set('tasks',tasks);renderTasks();}
function editT(id,text){const t=tasks.find(t=>t.id===id);if(t&&text.trim()){t.text=text.trim();S.set('tasks',tasks);}}

// CALENDARIO
function renderCal(){const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];document.getElementById('cal-lbl').textContent=`${months[calM]} ${calY}`;const g=document.getElementById('calgrid');const days=['D','L','M','M','J','V','S'];let html=days.map(d=>`<div class="cdn">${d}</div>`).join('');const first=new Date(calY,calM,1).getDay(),total=new Date(calY,calM+1,0).getDate(),prev=new Date(calY,calM,0).getDate();const today=new Date().toISOString().split('T')[0];for(let i=0;i<first;i++)html+=`<div class="cd om">${prev-first+i+1}</div>`;for(let d=1;d<=total;d++){const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const has=events.some(e=>e.date===ds),isTod=ds===today,isSel=ds===calSel;html+=`<div class="cd${isTod?' today':''}${has?' has':''}${isSel?' sel':''}" onclick="selDay('${ds}')">${d}</div>`;}g.innerHTML=html;renderEvList();}
function calNav(d){calM+=d;if(calM>11){calM=0;calY++}if(calM<0){calM=11;calY--}renderCal();}
function calToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCal();}
function selDay(d){calSel=d;document.getElementById('ev-date').value=d;renderCal();}
function renderEvList(){const el=document.getElementById('evlist');const f=events.filter(e=>e.date===calSel).sort((a,b)=>(a.time||'').localeCompare(b.time||''));const lbl=document.getElementById('ev-day-lbl');if(lbl)lbl.textContent=`Eventos — ${calSel}`;if(!f.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">Sin eventos</div>';return;}const pc=['','g','a'];el.innerHTML=f.map((e,i)=>`<div class="evcard"><div class="evpill ${pc[i%3]}"></div><div style="flex:1"><div class="evtitle">${esc(e.title)}</div><div class="evtime">${e.date}${e.time?' · '+e.time:''}</div></div><button class="btn dg sm" style="padding:3px 7px" onclick="delEv('${e.id}')">×</button></div>`).join('');}
function addEvent(){const title=document.getElementById('ev-title').value.trim(),date=document.getElementById('ev-date').value.trim(),time=document.getElementById('ev-time').value.trim();if(!title||!date)return;events.push({id:'e'+Date.now(),title,date,time});S.set('events',events);document.getElementById('ev-title').value='';document.getElementById('ev-time').value='';renderCal();updBadges();}
function delEv(id){events=events.filter(e=>e.id!==id);S.set('events',events);renderCal();updBadges();}

// TABLAS
function renderTbls(){const c=document.getElementById('tblcont');if(!tables.length){c.innerHTML='<div class="empty">Sin tablas.</div>';return;}c.innerHTML=tables.map((tbl,ti)=>`<div class="tblblock"><div class="tblhdr"><input class="tblname" value="${esc(tbl.name)}" onchange="tables[${ti}].name=this.value;S.set('tables',tables)"/><button class="btn sm dg" onclick="delTbl(${ti})">Eliminar</button></div><div class="tblwrap"><table class="dt"><thead><tr>${tbl.cols.map(c=>`<th>${esc(c)}</th>`).join('')}<th style="width:32px"></th></tr></thead><tbody>${tbl.rows.map((row,ri)=>`<tr>${tbl.cols.map((c,ci)=>`<td><input type="text" value="${esc(row[ci]||'')}" onchange="tables[${ti}].rows[${ri}][${ci}]=this.value;S.set('tables',tables)"/></td>`).join('')}<td><button class="btn dg sm" style="padding:2px 6px" onclick="delRow(${ti},${ri})">×</button></td></tr>`).join('')}</tbody></table></div><div class="tblfoot"><button class="btn sm" onclick="addRow(${ti})">+ Fila</button></div></div>`).join('');}
function createTbl(){const name=document.getElementById('tbl-name-in').value.trim()||'Nueva tabla';const cols=(document.getElementById('tbl-cols-in').value.trim()||'Col 1,Col 2,Col 3').split(',').map(c=>c.trim()).filter(Boolean);tables.push({id:'tb'+Date.now(),name,cols,rows:[[]]});S.set('tables',tables);closeMo('mo-tbl');document.getElementById('tbl-name-in').value='';document.getElementById('tbl-cols-in').value='';renderTbls();}
function addRow(ti){tables[ti].rows.push([]);S.set('tables',tables);renderTbls();}
function delRow(ti,ri){tables[ti].rows.splice(ri,1);S.set('tables',tables);renderTbls();}
function delTbl(ti){if(!confirm('¿Eliminar?'))return;tables.splice(ti,1);S.set('tables',tables);renderTbls();}

function openMo(id){document.getElementById(id).classList.add('open');}
function closeMo(id){document.getElementById(id).classList.remove('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));
</script>
</body>
</html>

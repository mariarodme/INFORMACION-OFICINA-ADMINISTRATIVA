<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Oficina</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600&family=Google+Sans+Display:wght@400;500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--sidebar-bg:#f9f9ff;--white:#fff;
  --border:#e3e8f7;--border-soft:#eef1fa;
  --text:#1c1f26;--text2:#5f6577;--text3:#9aa0b4;
  --blue:#4f72e3;--blue-lt:#e8eeff;--blue-mid:#6b8ffb;
  --purple:#8b5cf6;--pink:#ec4899;
  --green:#10b981;--gbg:#ecfdf5;
  --amber:#f59e0b;--abg:#fffbeb;
  --red:#ef4444;--rbg:#fef2f2;
  --grad:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);
  --shadow:0 1px 3px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(79,114,227,.12);
  --sb-w:256px;--sb-col:64px;
  --trans:.25s cubic-bezier(.4,0,.2,1);
  --fh:'Google Sans',sans-serif;--fb:'Roboto',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── AUTH SCREEN ── */
#auth-screen{display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:36px 40px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(79,114,227,.12)}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.auth-logo-icon{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(99,102,241,.3)}
.auth-logo-icon svg{width:17px;height:17px}
.auth-logo-text{font-family:var(--fh);font-size:18px;font-weight:500;color:var(--text)}
.auth-title{font-family:'Google Sans Display',sans-serif;font-size:24px;font-weight:400;color:var(--text);text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.auth-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:22px}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:var(--fh);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--white);color:var(--blue);box-shadow:var(--shadow)}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.auth-field input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-family:var(--fb);font-size:14px;color:var(--text);background:var(--white);outline:none;transition:border-color .18s,box-shadow .18s}
.auth-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,114,227,.1)}
.auth-btn{width:100%;padding:11px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-family:var(--fh);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;box-shadow:0 2px 10px rgba(79,114,227,.3);margin-top:4px}
.auth-btn:hover{background:#3d5fd1}
.auth-btn:disabled{background:var(--text3);cursor:not-allowed;box-shadow:none}
.auth-msg{font-size:12px;text-align:center;margin-top:12px;padding:8px 12px;border-radius:8px;display:none}
.auth-msg.error{background:var(--rbg);color:var(--red);display:block}
.auth-msg.success{background:var(--gbg);color:var(--green);display:block}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text3);font-size:12px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── APP ── */
#app-screen{display:none}
.layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sb-w);background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 8px;position:fixed;top:0;left:0;height:100vh;overflow:hidden;z-index:50;transition:width var(--trans)}
.sidebar.collapsed{width:var(--sb-col)}
@media(max-width:768px){.sidebar{display:none}}
.sb-header{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 16px;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0;overflow:hidden}
.sb-logo-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(99,102,241,.3);cursor:pointer}
.sb-logo-icon svg{width:15px;height:15px}
.sb-logo-text{font-family:var(--fh);font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;transition:opacity var(--trans),max-width var(--trans);max-width:160px;opacity:1}
.sidebar.collapsed .sb-logo-text{max-width:0;opacity:0}
.toggle-btn{width:32px;height:32px;border-radius:8px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;transition:background .15s,color .15s,transform var(--trans)}
.toggle-btn:hover{background:rgba(79,114,227,.1);color:var(--blue)}
.sidebar.collapsed .toggle-btn{transform:rotate(180deg)}
.sb-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;padding:6px 12px 4px;display:block;white-space:nowrap;transition:opacity var(--trans),max-height var(--trans);opacity:1;max-height:30px}
.sidebar.collapsed .sb-label{opacity:0;max-height:0;padding-top:0;padding-bottom:0}
.nb{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;color:var(--text2);font-size:13.5px;font-weight:400;border:none;background:none;width:100%;text-align:left;border-radius:24px;transition:background .15s,color .15s;font-family:var(--fh);white-space:nowrap;overflow:hidden}
.nb:hover{background:rgba(79,114,227,.08);color:var(--text)}
.nb.active{background:var(--blue-lt);color:var(--blue);font-weight:500}
.nb-icon{width:18px;height:18px;flex-shrink:0;opacity:.6}
.nb.active .nb-icon,.nb:hover .nb-icon{opacity:1}
.nb-label{overflow:hidden;transition:opacity var(--trans),max-width var(--trans);max-width:180px;opacity:1}
.sidebar.collapsed .nb-label{max-width:0;opacity:0}
.nb-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--blue-lt);color:var(--blue);flex-shrink:0;transition:opacity var(--trans)}
.nb-badge.g{background:var(--gbg);color:var(--green)}.nb-badge.a{background:var(--abg);color:var(--amber)}
.sidebar.collapsed .nb-badge{opacity:0;pointer-events:none}
.sb-div{height:1px;background:var(--border-soft);margin:8px 6px}
.cat-wrap{display:flex;align-items:center;border-radius:24px;transition:background .15s;overflow:hidden}
.cat-wrap:hover{background:rgba(79,114,227,.08)}
.cat-wrap:hover .cat-edit{opacity:1}
.cat-wrap.active{background:var(--blue-lt)}
.cat-btn{flex:1;display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;color:var(--text2);font-size:12.5px;font-weight:400;border:none;background:none;text-align:left;font-family:var(--fh);transition:color .15s;min-width:0;white-space:nowrap;overflow:hidden}
.cat-wrap.active .cat-btn{color:var(--blue);font-weight:500}
.cat-btn-label{overflow:hidden;transition:opacity var(--trans),max-width var(--trans);max-width:160px;opacity:1;text-overflow:ellipsis;white-space:nowrap;display:block}
.sidebar.collapsed .cat-btn-label{max-width:0;opacity:0}
.cat-edit{opacity:0;background:none;border:none;cursor:pointer;padding:8px 8px;color:var(--text3);transition:opacity .15s,color .15s;border-radius:0 24px 24px 0;flex-shrink:0}
.cat-edit:hover{color:var(--blue)}
.sidebar.collapsed .cat-edit{display:none}
/* User bar */
.sb-user{margin-top:auto;padding-top:12px;border-top:1px solid var(--border-soft);display:flex;align-items:center;gap:9px;padding:12px 10px 0;flex-shrink:0}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#ec4899);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.sb-user-info{flex:1;min-width:0;overflow:hidden;transition:opacity var(--trans),max-width var(--trans);max-width:160px;opacity:1}
.sidebar.collapsed .sb-user-info{max-width:0;opacity:0}
.sb-user-email{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.sb-logout{background:none;border:none;cursor:pointer;padding:5px 7px;color:var(--text3);border-radius:6px;transition:color .15s,background .15s;flex-shrink:0;font-size:11px}
.sb-logout:hover{color:var(--red);background:var(--rbg)}
.sidebar.collapsed .sb-logout{display:none}

/* MOBILE */
.mob-topbar{display:none;background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:40;box-shadow:var(--shadow)}
@media(max-width:768px){.mob-topbar{display:flex}}
.mob-menu-btn{background:none;border:none;cursor:pointer;padding:6px;color:var(--text2);border-radius:8px}
.mob-drawer{display:none;position:fixed;inset:0;z-index:100}
.mob-drawer.open{display:block}
.mob-drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,.2)}
.mob-drawer-panel{position:absolute;left:0;top:0;bottom:0;width:280px;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:16px 8px;overflow-y:auto}

/* MAIN */
.main{flex:1;margin-left:var(--sb-w);display:flex;flex-direction:column;min-height:100vh;transition:margin-left var(--trans)}
.main.sb-col{margin-left:var(--sb-col)}
@media(max-width:768px){.main{margin-left:0!important}}
.content{flex:1;overflow-y:auto}
.panel{display:none;animation:fi .2s ease}
.panel.on{display:flex;flex-direction:column}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* HOME */
#panel-overview{align-items:stretch}
.home-top{padding:52px 40px 24px;display:flex;flex-direction:column;align-items:center;text-align:center}
@media(max-width:600px){.home-top{padding:32px 20px 20px}}
.home-greeting{font-family:'Google Sans Display',sans-serif;font-size:40px;font-weight:400;letter-spacing:-.03em;line-height:1.2;margin-bottom:6px}
.home-greeting .grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:15px;color:var(--text2);font-weight:300;margin-bottom:32px}
.stat-pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:32px}
.stat-pill{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;font-family:var(--fh)}
.stat-pill:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.stat-pill b{color:var(--text);font-weight:600}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0}
.sdot.g{background:var(--green)}.sdot.a{background:var(--amber)}.sdot.p{background:var(--purple)}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:0 40px 28px;width:100%;max-width:960px;margin:0 auto}
@media(max-width:600px){.quick-grid{padding:0 16px 20px;grid-template-columns:1fr 1fr}}
.qcard{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:18px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.qcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.qcard-accent{position:absolute;top:0;left:0;right:0;height:3px}
.qcard-accent.blue{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.qcard-accent.green{background:linear-gradient(90deg,#10b981,#34d399)}
.qcard-accent.amber{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.qcard-accent.pink{background:linear-gradient(90deg,#ec4899,#f43f5e)}
.qcard-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.qcard-num{font-family:'Google Sans Display',sans-serif;font-size:36px;font-weight:400;letter-spacing:-.04em;line-height:1;margin-bottom:4px}
.qcard-num.blue{color:#6366f1}.qcard-num.green{color:var(--green)}.qcard-num.amber{color:var(--amber)}.qcard-num.pink{color:#ec4899}
.qcard-desc{font-size:12px;color:var(--text3);font-weight:300}
.home-lists{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 40px 40px;width:100%;max-width:960px;margin:0 auto}
@media(max-width:600px){.home-lists{grid-template-columns:1fr;padding:0 16px 28px}}
.hlist-card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow)}
.hlist-title{font-family:var(--fh);font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.hlist-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
.hlist-row:last-child{border-bottom:none}
.hlist-ev{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
.hlist-ev:last-child{border-bottom:none}
.evbar{width:3px;min-height:28px;border-radius:3px;flex-shrink:0;margin-top:2px;background:var(--blue)}
.evbar.g{background:var(--green)}.evbar.a{background:var(--amber)}

/* INNER */
.inner-panel{padding:32px 40px;max-width:900px;width:100%}
@media(max-width:600px){.inner-panel{padding:20px 16px}}
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.ptitle{font-family:'Google Sans Display',sans-serif;font-size:24px;font-weight:400;letter-spacing:-.03em;color:var(--text)}
.psubtitle{font-size:12px;color:var(--text3);margin-top:3px}
.phdr-right{display:flex;gap:8px}

/* BUTTONS */
.btn{font-family:var(--fh);font-size:13px;font-weight:500;border-radius:20px;padding:8px 16px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);display:inline-flex;align-items:center;gap:7px;transition:all .15s;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 10px rgba(79,114,227,.3)}
.btn.primary:hover{background:#3d5fd1}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.ghost{border-color:transparent;background:none;box-shadow:none;color:var(--text2)}
.btn.ghost:hover{background:rgba(79,114,227,.08);color:var(--blue)}
.btn.dg{border-color:transparent;background:none;box-shadow:none;color:var(--text3)}
.btn.dg:hover{color:var(--red);background:var(--rbg)}
.btn.soft{background:var(--blue-lt);color:var(--blue);border-color:transparent;box-shadow:none}
.btn.soft:hover{background:#dde8fe}

/* INPUTS */
input[type=text],textarea,select{font-family:var(--fb);font-size:13px;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:10px 14px;outline:none;width:100%;transition:border-color .18s,box-shadow .18s;box-shadow:var(--shadow)}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,114,227,.1)}
textarea{resize:vertical;min-height:80px;line-height:1.7}
select option{background:var(--white)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.01em}

/* CATEGORY PANEL */
.subcat-block{background:var(--white);border:1px solid var(--border);border-radius:18px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.subcat-hdr{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--border-soft)}
.subcat-name{font-family:var(--fh);font-size:14px;font-weight:500;color:var(--text);flex:1}
.subcat-count{font-size:11px;color:var(--text3);background:var(--bg);padding:2px 9px;border-radius:20px;border:1px solid var(--border-soft)}
.subcat-name-input{font-family:var(--fh);font-size:14px;font-weight:500;flex:1;background:var(--bg);border:1px solid var(--blue);border-radius:8px;padding:4px 9px;outline:none;color:var(--text)}
.msgrow{display:flex;align-items:stretch;border-bottom:1px solid var(--border-soft);transition:background .13s}
.msgrow:last-child{border-bottom:none}
.msgrow:hover{background:#f8f9ff}
.msgrow-left{flex:1;padding:13px 16px;min-width:0}
.msgrow-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.msgrow-text{font-size:12.5px;color:var(--text2);line-height:1.65;white-space:pre-wrap;font-weight:300}
.msgrow-actions{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 12px;background:var(--bg);border-left:1px solid var(--border-soft);flex-shrink:0}
.copybtn{font-size:11.5px;font-weight:500;padding:6px 14px;border-radius:20px;background:var(--blue);color:#fff;border:none;cursor:pointer;transition:all .14s;white-space:nowrap;box-shadow:0 1px 6px rgba(79,114,227,.25)}
.copybtn:hover{background:#3d5fd1}
.copybtn.ok{background:var(--green)}
.subcat-footer{padding:10px 16px;background:var(--bg);border-top:1px solid var(--border-soft)}
.empty-cat{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* NOTAS */
.ngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.ncard{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:15px;border-top:2.5px solid var(--blue);box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.ncard.green{border-top-color:var(--green)}.ncard.amber{border-top-color:var(--amber)}
.ncard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.ntop{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.ntag{font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--blue-lt);color:var(--blue)}
.ntag.green{background:var(--gbg);color:var(--green)}.ntag.amber{background:var(--abg);color:var(--amber)}
.ntitle{font-family:var(--fh);font-size:14px;font-weight:500;background:none;border:none;color:var(--text);width:100%;outline:none;margin-bottom:7px}
.nbody{font-size:13px;line-height:1.65;background:none;border:none;color:var(--text2);width:100%;outline:none;resize:none;min-height:56px;font-family:var(--fb);font-weight:300}
.nfoot{margin-top:10px;font-size:11px;color:var(--text3)}

/* TAREAS */
.tform{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tform input{flex:1;min-width:150px}
.tform select{width:130px}
.tsec{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:10px}
.tsec::after{content:'';flex:1;height:1px;background:var(--border-soft)}
.tgroup{margin-bottom:20px}
.titem{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:12px;border:1px solid transparent;transition:all .13s}
.titem:hover{background:var(--white);border-color:var(--border);box-shadow:var(--shadow)}
.titem.done .ttxt{text-decoration:line-through;color:var(--text3)}
.chk{width:18px;height:18px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .13s;background:var(--white)}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:'✓';font-size:11px;color:#fff;font-weight:600}
.ttxt{flex:1;font-size:13.5px;line-height:1.5;outline:none}
.ttxt:focus{border-bottom:1px dashed var(--border)}
.pri{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0;margin-top:2px}
.pri.alta{background:var(--rbg);color:var(--red)}.pri.media{background:var(--abg);color:var(--amber)}.pri.baja{background:var(--gbg);color:var(--green)}

/* CALENDARIO */
.caltwo{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
@media(max-width:600px){.caltwo{grid-template-columns:1fr}}
.calhdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.calhdr h3{font-family:var(--fh);font-size:17px;font-weight:400;color:var(--text);flex:1;letter-spacing:-.02em}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cdn{text-align:center;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:6px 0}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;border:1px solid transparent;font-size:12px;position:relative;transition:all .13s;color:var(--text2)}
.cd:hover{background:var(--blue-lt);color:var(--blue)}
.cd.today{background:var(--blue);color:#fff;font-weight:600}
.cd.om{color:var(--border)}
.cd.has::after{content:'';position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cd.sel{background:var(--blue-lt);border-color:rgba(79,114,227,.3);color:var(--blue);font-weight:500}
.cd.today.sel{background:var(--blue);color:#fff}
.evcard{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border-radius:12px;background:var(--white);border:1px solid var(--border);margin-bottom:8px;box-shadow:var(--shadow)}
.evpill{width:3px;min-height:30px;border-radius:3px;background:var(--blue);flex-shrink:0}
.evpill.g{background:var(--green)}.evpill.a{background:var(--amber)}
.evtitle{font-size:13px;font-weight:500;color:var(--text)}
.evtime{font-size:11px;color:var(--text3);margin-top:2px}
.evform{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.evform .row{display:flex;gap:8px;margin-bottom:8px}
.evform .row:last-child{margin-bottom:0}
.rsubttl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}

/* TABLAS */
.tblblock{background:var(--white);border:1px solid var(--border);border-radius:18px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.tblhdr{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:1px solid var(--border-soft)}
.tblname{font-family:var(--fh);font-size:14px;font-weight:500;color:var(--text);background:none;border:none;outline:none;flex:1}
.tblname:focus{border-bottom:1px solid var(--blue)}
.tblwrap{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse}
.dt th{background:var(--bg);color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:9px 13px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border-soft)}
.dt td{padding:9px 13px;border-bottom:1px solid var(--border-soft);font-size:13px}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:#f8f9ff}
.dt td input{background:none;border:none;color:var(--text);width:100%;outline:none;padding:0;font-size:13px;font-family:var(--fb)}
.dt td input:focus{border-bottom:1px solid var(--blue)}
.tblfoot{padding:9px 14px;border-top:1px solid var(--border-soft);background:var(--bg)}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:14px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--fh);font-size:13px;color:var(--text3)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(15,20,40,.25);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mobox{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:26px 28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(79,114,227,.15)}
.mobox h3{font-family:'Google Sans Display',sans-serif;font-size:18px;font-weight:400;color:var(--text);margin-bottom:18px;letter-spacing:-.02em}
.mofoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border-soft)}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:13px;font-family:var(--fh);padding:10px 18px;border-radius:20px;z-index:999;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:none}
</style>
</head>

<script>
// ── SUPABASE ──
const SUPA_URL='https://qsowrhvynmpmapsvxwmv.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzb3dyaHZ5bm1wbWFwc3Z4d212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzgxMjUsImV4cCI6MjA5MjQ1NDEyNX0.Pj0jfZV1a5Up4i8_NmLE03blZLEOzlBcguJBommopBE';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

const DEFAULT_CATS=[
  {id:'c1',name:'Mensajes para cotizar transportes'},
  {id:'c2',name:'Confirmación de transporte'},
  {id:'c3',name:'Rental car'},
  {id:'c4',name:'Cotización de reservas por correos y dueños'},
  {id:'c5',name:'Rentas mensuales'},
  {id:'c6',name:'Llamadas reservas extranjeras'},
  {id:'c7',name:'Reservas tours onsite'},
  {id:'c8',name:'Mensajes para app VRBO y Airbnb'},
  {id:'c9',name:'Pagos en link reservas correos o apps'},
  {id:'c10',name:'Cancelación de reserva'},
  {id:'c11',name:'Registro oficina para saldo pendiente'},
  {id:'c12',name:'Recordatorio de reserva sin pago in hold'},
  {id:'c13',name:'Reglas — Condominio y visitas permitidas'},
  {id:'c14',name:'Check in — Reservas próximas'},
  {id:'c15',name:'Coordinar limpieza mensual condos'},
];

let currentUser=null;
let cats=[],subcats=[],msgs=[],notes=[],tasks=[],events=[],tables=[];
let activeCatId=null,editMsgId=null,addSubcatId=null,editCatId=null;
let sbCol=false,calY,calM,calSel;
let authMode='login';

// ── AUTH UI ──
function switchAuthTab(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(mode==='login'?0:1)));
  document.getElementById('auth-title').textContent=mode==='login'?'Bienvenida':'Crear cuenta';
  document.getElementById('auth-sub').textContent=mode==='login'?'Iniciá sesión en tu cuenta':'Registrá tu cuenta nueva';
  document.getElementById('auth-btn').textContent=mode==='login'?'Iniciar sesión':'Registrarse';
  document.getElementById('auth-name-field').style.display=mode==='register'?'block':'none';
  document.getElementById('auth-msg').className='auth-msg';
}

async function authSubmit(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const name=document.getElementById('auth-name').value.trim();
  const btn=document.getElementById('auth-btn');
  const msg=document.getElementById('auth-msg');
  if(!email||!pass){showAuthMsg('Completá todos los campos','error');return;}
  btn.disabled=true;btn.textContent='Cargando...';
  msg.className='auth-msg';
  try{
    if(authMode==='login'){
      const{error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
    } else {
      if(!name){showAuthMsg('Ingresá tu nombre','error');btn.disabled=false;btn.textContent='Registrarse';return;}
      const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
      if(error)throw error;
      if(data.user&&!data.session){showAuthMsg('¡Registrada! Revisá tu correo para confirmar la cuenta.','success');btn.disabled=false;btn.textContent='Registrarse';return;}
    }
  } catch(e){
    const msgs={
      'Invalid login credentials':'Email o contraseña incorrectos',
      'User already registered':'Este email ya está registrado',
      'Password should be at least 6 characters':'La contraseña debe tener al menos 6 caracteres',
      'Email rate limit exceeded':'Demasiados intentos, esperá un momento',
    };
    showAuthMsg(msgs[e.message]||e.message,'error');
    btn.disabled=false;btn.textContent=authMode==='login'?'Iniciar sesión':'Registrarse';
  }
}

function showAuthMsg(text,type){
  const el=document.getElementById('auth-msg');
  el.textContent=text;el.className='auth-msg '+type;
}

// ── SESSION ──
sb.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    currentUser=session.user;
    await initApp();
  } else {
    currentUser=null;
    document.getElementById('loading').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

async function logout(){
  await sb.auth.signOut();
  showToast('Sesión cerrada');
}

// ── INIT APP ──
async function initApp(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('auth-screen').style.display='none';

  // User info
  const email=currentUser.email||'';
  const name=currentUser.user_metadata?.full_name||email.split('@')[0]||'bienvenida';
  document.getElementById('greeting-name').textContent=name;
  document.getElementById('sb-email').textContent=email;
  document.getElementById('sb-avatar').textContent=name.charAt(0).toUpperCase();

  // Date
  const now=new Date();
  const ds=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ms=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  document.getElementById('home-sub-date').textContent=`${ds[now.getDay()]}, ${now.getDate()} de ${ms[now.getMonth()]} ${now.getFullYear()}`;
  calY=now.getFullYear();calM=now.getMonth();calSel=now.toISOString().split('T')[0];

  // Sidebar collapse preference
  sbCol=localStorage.getItem('sb_col')==='true';
  applySB();

  // Title
  const ti=document.getElementById('app-title');
  ti.addEventListener('input',()=>{document.title=ti.value;});

  // Load data
  await loadAllData();

  document.getElementById('loading').style.display='none';
  document.getElementById('app-screen').style.display='block';
  buildNav();
  renderAll();
}

// ── DATA LOAD ──
async function loadAllData(){
  const uid=currentUser.id;
  const [catsR,subcatsR,msgsR,tasksR,eventsR,notesR,tablesR]=await Promise.all([
    sb.from('categories').select('*').eq('user_id',uid).order('position'),
    sb.from('subcategories').select('*').eq('user_id',uid),
    sb.from('texts').select('*').eq('user_id',uid).order('created_at'),
    sb.from('tasks').select('*').eq('user_id',uid),
    sb.from('events').select('*').eq('user_id',uid),
    sb.from('notes').select('*').eq('user_id',uid),
    sb.from('tables_data').select('*').eq('user_id',uid),
  ]);

  // If no categories yet, insert defaults
  if(!catsR.data||catsR.data.length===0){
    const toInsert=DEFAULT_CATS.map((c,i)=>({...c,user_id:uid,position:i}));
    const{data}=await sb.from('categories').insert(toInsert).select();
    cats=data||DEFAULT_CATS;
  } else {
    cats=catsR.data;
  }

  subcats=subcatsR.data||[];
  msgs=msgsR.data||[];
  tasks=tasksR.data||[];
  events=eventsR.data||[];
  notes=notesR.data||[];
  tables=tablesR.data||[];
}

// ── SIDEBAR TOGGLE ──
function toggleSB(){
  sbCol=!sbCol;
  localStorage.setItem('sb_col',sbCol);
  applySB();
}
function applySB(){
  const sb2=document.getElementById('sidebar'),m=document.getElementById('main');
  if(sbCol){sb2.classList.add('collapsed');m.classList.add('sb-col');}
  else{sb2.classList.remove('collapsed');m.classList.remove('sb-col');}
}

// ── NAV ──
function buildNav(){
  document.getElementById('cat-nav').innerHTML=cats.map(c=>`
    <div class="cat-wrap${activeCatId===c.id?' active':''}" id="cnw-${c.id}">
      <button class="cat-btn" onclick="openCat('${c.id}')">
        <svg style="width:15px;height:15px;flex-shrink:0;opacity:.5" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
        <span class="cat-btn-label">${esc(c.name)}</span>
      </button>
      <button class="cat-edit" onclick="startEditCat('${c.id}')" title="Editar">
        <svg style="width:13px;height:13px" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
      </button>
    </div>`).join('');

}

function buildMobDrawer(){
  const p=document.getElementById('mob-drawer-panel');if(!p)return;
  p.innerHTML=`<div style="padding:8px 12px 20px;font-family:var(--fh);font-size:15px;font-weight:500">Mi Oficina</div>
    <button class="nb" onclick="goTab('overview');closeDrawer()"><span class="nb-label" style="max-width:200px;opacity:1">Inicio</span></button>
    <div style="height:1px;background:var(--border-soft);margin:8px 14px"></div>
    <span class="sb-label">Herramientas</span>
    <button class="nb" onclick="goTab('tareas');closeDrawer()"><span class="nb-label" style="max-width:200px;opacity:1">Tareas</span></button>
    <button class="nb" onclick="goTab('calendario');closeDrawer()"><span class="nb-label" style="max-width:200px;opacity:1">Calendario</span></button>
    <button class="nb" onclick="goTab('notas');closeDrawer()"><span class="nb-label" style="max-width:200px;opacity:1">Notas</span></button>
    <button class="nb" onclick="goTab('tablas');closeDrawer()"><span class="nb-label" style="max-width:200px;opacity:1">Tablas</span></button>
    <div style="height:1px;background:var(--border-soft);margin:8px 14px"></div>
    <span class="sb-label">Categorías</span>`+

}

function openDrawer(){document.getElementById('mob-drawer').classList.add('open');}
function closeDrawer(){document.getElementById('mob-drawer').classList.remove('open');}

function renderAll(){updBadges();renderOv();renderNotes();renderTasks();renderCal();renderTbls();}

function updBadges(){
  const p=tasks.filter(t=>!t.done).length;
  const tod=new Date().toISOString().split('T')[0];
  const te=events.filter(e=>e.date>=tod).length;
  const bt=document.getElementById('nb-t'),be=document.getElementById('nb-e');
  if(bt){bt.textContent=p;bt.style.display=p?'':'none';}
  if(be){be.textContent=te;be.style.display=te?'':'none';}
}

function goTab(t){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+t).classList.add('on');
  document.querySelectorAll('.nb,.cat-wrap').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll(`.nb[onclick*="goTab('${t}')"]`).forEach(b=>b.classList.add('active'));
  activeCatId=null;
  if(t==='overview')renderOv();
}

function openCat(id){
  activeCatId=id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-cat').classList.add('on');
  document.querySelectorAll('.nb,.cat-wrap').forEach(b=>b.classList.remove('active'));
  const w=document.getElementById('cnw-'+id);if(w)w.classList.add('active');
  const cat=cats.find(c=>c.id===id);
  document.getElementById('cat-ptitle').textContent=cat?cat.name:'';
  renderCatPanel();
}

// ── EDIT CATEGORY ──
function startEditCat(id){editCatId=id;const cat=cats.find(c=>c.id===id);if(!cat)return;document.getElementById('edit-cat-in').value=cat.name;openMo('mo-edit-cat');}

async function saveEditCat(){
  const name=document.getElementById('edit-cat-in').value.trim();if(!name)return;
  const cat=cats.find(c=>c.id===editCatId);
  if(cat){
    cat.name=name;
    await sb.from('categories').update({name}).eq('id',editCatId).eq('user_id',currentUser.id);
  }
  closeMo('mo-edit-cat');buildNav();
  if(activeCatId===editCatId)document.getElementById('cat-ptitle').textContent=name;
  const w=document.getElementById('cnw-'+editCatId);if(w)w.classList.add('active');
  editCatId=null;showToast('Categoría actualizada');
}

async function deleteCatFn(){
  if(!confirm('¿Eliminar esta categoría y todo su contenido?'))return;
  const id=editCatId;
  await sb.from('categories').delete().eq('id',id).eq('user_id',currentUser.id);
  subcats=subcats.filter(s=>s.cat_id!==id);
  msgs=msgs.filter(m=>m.cat_id!==id);
  cats=cats.filter(c=>c.id!==id);
  closeMo('mo-edit-cat');buildNav();
  if(activeCatId===id){activeCatId=null;goTab('overview');}
  editCatId=null;updBadges();showToast('Categoría eliminada');
}

// ── CATEGORY PANEL ──
function renderCatPanel(){
  if(!activeCatId)return;
  const subs=subcats.filter(s=>s.cat_id===activeCatId);
  const total=msgs.filter(m=>m.cat_id===activeCatId).length;
  document.getElementById('cat-psub').textContent=subs.length?`${subs.length} subcategoría${subs.length!==1?'s':''} · ${total} texto${total!==1?'s':''}`:' ';
  const cont=document.getElementById('subcats-cont');
  if(!subs.length){cont.innerHTML=`<div class="empty-cat"><p style="font-size:15px;color:var(--text2);margin-bottom:6px">Sin subcategorías todavía</p><p>Presioná <b style="color:var(--blue)">+ Subcategoría</b> para empezar</p></div>`;return;}
  cont.innerHTML=subs.map(sub=>{
    const m=msgs.filter(m=>m.subcat_id===sub.id);
    return `<div class="subcat-block">
      <div class="subcat-hdr">
        <span class="subcat-name" id="sn-${sub.id}">${esc(sub.name)}</span>
        <span class="subcat-count">${m.length} texto${m.length!==1?'s':''}</span>
        <button class="btn sm soft" onclick="renameSubcat('${sub.id}')" style="font-size:11px;padding:4px 11px">Renombrar</button>
        <button class="btn sm dg" onclick="delSubcat('${sub.id}')" style="font-size:11px;padding:4px 8px">×</button>
      </div>
      <div>${m.length?m.map(msg=>`<div class="msgrow">
        <div class="msgrow-left">
          <div class="msgrow-name">${esc(msg.name)}</div>
          <div class="msgrow-text">${esc(msg.body)}</div>
        </div>
        <div class="msgrow-actions">
          <button class="copybtn" id="cb-${msg.id}" onclick="copyMsg('${msg.id}')">Copiar</button>
          <button class="btn sm soft" onclick="editMsg('${msg.id}')" style="font-size:11px;padding:4px 10px">Editar</button>
          <button class="btn sm dg" onclick="delMsg('${msg.id}')" style="font-size:11px">×</button>
        </div>
      </div>`).join(''):'<div style="padding:13px 16px;color:var(--text3);font-size:13px">Sin textos aún.</div>'}</div>
      <div class="subcat-footer"><button class="btn sm primary" onclick="openAddMsg('${sub.id}')">+ Agregar texto</button></div>
    </div>`;
  }).join('');
}

function renameSubcat(id){
  const sub=subcats.find(s=>s.id===id);if(!sub)return;
  const el=document.getElementById('sn-'+id);if(!el)return;
  const inp=document.createElement('input');inp.className='subcat-name-input';inp.value=sub.name;
  inp.onblur=async()=>{const v=inp.value.trim();if(v&&v!==sub.name){sub.name=v;await sb.from('subcategories').update({name:v}).eq('id',id).eq('user_id',currentUser.id);}renderCatPanel();};
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=sub.name;inp.blur();}};
  el.replaceWith(inp);inp.focus();inp.select();
}

async function delSubcat(id){
  if(!confirm('¿Eliminar esta subcategoría y sus textos?'))return;
  await sb.from('subcategories').delete().eq('id',id).eq('user_id',currentUser.id);
  subcats=subcats.filter(s=>s.id!==id);msgs=msgs.filter(m=>m.subcat_id!==id);
  renderCatPanel();updBadges();showToast('Subcategoría eliminada');
}

function openAddMsg(sid){addSubcatId=sid;editMsgId=null;document.getElementById('mo-msg-h').textContent='Agregar texto';document.getElementById('mo-msg-btn').textContent='Guardar';document.getElementById('msg-name-in').value='';document.getElementById('msg-text-in').value='';openMo('mo-msg');}

function editMsg(id){
  const msg=msgs.find(m=>m.id===id);if(!msg)return;
  editMsgId=id;addSubcatId=msg.subcat_id;
  document.getElementById('mo-msg-h').textContent='Editar texto';
  document.getElementById('mo-msg-btn').textContent='Guardar cambios';
  document.getElementById('msg-name-in').value=msg.name;
  document.getElementById('msg-text-in').value=msg.body;
  openMo('mo-msg');
}

async function saveMsg(){
  const name=document.getElementById('msg-name-in').value.trim();
  const body=document.getElementById('msg-text-in').value.trim();
  if(!name&&!body)return;
  if(editMsgId){
    await sb.from('texts').update({name:name||'Sin título',body}).eq('id',editMsgId).eq('user_id',currentUser.id);
    const msg=msgs.find(m=>m.id===editMsgId);if(msg){msg.name=name||msg.name;msg.body=body;}
    showToast('Texto actualizado');
  } else {
    if(!addSubcatId)return;
    const newMsg={id:'m'+Date.now(),subcat_id:addSubcatId,cat_id:activeCatId,name:name||'Sin título',body,user_id:currentUser.id};
    await sb.from('texts').insert(newMsg);
    msgs.push(newMsg);
    showToast('Texto guardado');
  }
  closeMo('mo-msg');editMsgId=null;addSubcatId=null;renderCatPanel();updBadges();
}

function copyMsg(id){
  const msg=msgs.find(m=>m.id===id);if(!msg)return;
  navigator.clipboard.writeText(msg.body).then(()=>{
    const btn=document.getElementById('cb-'+id);
    if(btn){btn.textContent='¡Copiado!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('ok')},1800);}
  });
}

async function delMsg(id){
  if(!confirm('¿Eliminar?'))return;
  await sb.from('texts').delete().eq('id',id).eq('user_id',currentUser.id);
  msgs=msgs.filter(m=>m.id!==id);renderCatPanel();updBadges();showToast('Texto eliminado');
}

async function saveSubcat(){
  const name=document.getElementById('subcat-in').value.trim();if(!name||!activeCatId)return;
  const newSub={id:'s'+Date.now(),cat_id:activeCatId,name,user_id:currentUser.id};
  await sb.from('subcategories').insert(newSub);
  subcats.push(newSub);
  closeMo('mo-subcat');document.getElementById('subcat-in').value='';renderCatPanel();showToast('Subcategoría creada');
}

    </div>

      <div class="hlist-title">Próximos eventos</div>

    </div>`;

// ── NOTAS ──
function renderNotes(){
  const g=document.getElementById('ngrid');
  if(!notes.length){g.innerHTML='<div style="grid-column:1/-1" class="empty">Sin notas.</div>';return;}
  g.innerHTML=notes.map((n,i)=>`<div class="ncard ${n.color||'blue'}">
    <div class="ntop"><span class="ntag ${n.color||'blue'}">${n.color==='green'?'Info':n.color==='amber'?'Importante':'General'}</span><button class="btn dg sm" style="padding:2px 7px" onclick="delNote('${n.id}')">×</button></div>
    <input class="ntitle" value="${esc(n.title)}" placeholder="Título..." onchange="updateNote('${n.id}','title',this.value)"/>
    <textarea class="nbody" placeholder="Contenido..." onchange="updateNote('${n.id}','body',this.value)">${esc(n.body)}</textarea>
    <div class="nfoot">${n.date||''}</div>
  </div>`).join('');
}

async function updateNote(id,field,val){
  const n=notes.find(n=>n.id===id);if(!n)return;
  n[field]=val;
  await sb.from('notes').update({[field]:val}).eq('id',id).eq('user_id',currentUser.id);
}

async function saveNote(){
  const t=document.getElementById('note-title-in').value.trim(),b=document.getElementById('note-body-in').value.trim(),c=document.getElementById('note-color-in').value;
  if(!t&&!b)return;
  const now=new Date().toLocaleDateString('es-CR');
  const newNote={id:'n'+Date.now(),title:t||'Sin título',body:b,color:c,date:now,user_id:currentUser.id};
  await sb.from('notes').insert(newNote);
  notes.unshift(newNote);
  closeMo('mo-note');document.getElementById('note-title-in').value='';document.getElementById('note-body-in').value='';
  renderNotes();showToast('Nota guardada');
}

async function delNote(id){
  if(!confirm('¿Eliminar?'))return;
  await sb.from('notes').delete().eq('id',id).eq('user_id',currentUser.id);
  notes=notes.filter(n=>n.id!==id);renderNotes();showToast('Nota eliminada');
}

// ── TAREAS ──
function renderTasks(){
  const p=tasks.filter(t=>!t.done),d=tasks.filter(t=>t.done);
  document.getElementById('tasks-p').innerHTML=p.length?p.map(tHTML).join(''):'<div style="color:var(--text3);font-size:13px;padding:7px 2px">Sin tareas pendientes</div>';
  document.getElementById('tasks-d').innerHTML=d.length?d.map(tHTML).join(''):'<div style="color:var(--text3);font-size:13px;padding:7px 2px">Ninguna completada</div>';
  updBadges();
}
function tHTML(t){return `<div class="titem${t.done?' done':''}">
  <div class="chk${t.done?' on':''}" onclick="toggleT('${t.id}')"></div>
  <div class="ttxt" contenteditable="true" onblur="updateTask('${t.id}','text',this.innerText)">${esc(t.text)}</div>
  <span class="pri ${t.priority}">${t.priority.toUpperCase()}</span>
  <button class="btn dg sm" style="padding:3px 7px" onclick="delT('${t.id}')">×</button>
</div>`;}

async function addTask(){
  const inp=document.getElementById('task-in'),pri=document.getElementById('task-pri').value,text=inp.value.trim();
  if(!text)return;
  const newTask={id:'t'+Date.now(),text,priority:pri,done:false,user_id:currentUser.id};
  await sb.from('tasks').insert(newTask);
  tasks.push(newTask);inp.value='';renderTasks();showToast('Tarea agregada');
}

async function toggleT(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  t.done=!t.done;
  await sb.from('tasks').update({done:t.done}).eq('id',id).eq('user_id',currentUser.id);
  renderTasks();
}

async function delT(id){
  tasks=tasks.filter(t=>t.id!==id);
  await sb.from('tasks').delete().eq('id',id).eq('user_id',currentUser.id);
  renderTasks();showToast('Tarea eliminada');
}

async function updateTask(id,field,val){
  const t=tasks.find(t=>t.id===id);if(!t||!val.trim())return;
  t[field]=val.trim();
  await sb.from('tasks').update({[field]:val.trim()}).eq('id',id).eq('user_id',currentUser.id);
}

// ── CALENDARIO ──
function renderCal(){
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-lbl').textContent=`${months[calM]} ${calY}`;
  const g=document.getElementById('calgrid');
  const days=['D','L','M','M','J','V','S'];
  let html=days.map(d=>`<div class="cdn">${d}</div>`).join('');
  const first=new Date(calY,calM,1).getDay(),total=new Date(calY,calM+1,0).getDate(),prev=new Date(calY,calM,0).getDate();
  const today=new Date().toISOString().split('T')[0];
  for(let i=0;i<first;i++)html+=`<div class="cd om">${prev-first+i+1}</div>`;
  for(let d=1;d<=total;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has=events.some(e=>e.date===ds),isTod=ds===today,isSel=ds===calSel;
    html+=`<div class="cd${isTod?' today':''}${has?' has':''}${isSel?' sel':''}" onclick="selDay('${ds}')">${d}</div>`;
  }
  g.innerHTML=html;renderEvList();
}
function calNav(d){calM+=d;if(calM>11){calM=0;calY++}if(calM<0){calM=11;calY--}renderCal();}
function calToday(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();renderCal();}
function selDay(d){calSel=d;document.getElementById('ev-date').value=d;renderCal();}
function renderEvList(){
  const el=document.getElementById('evlist');
  const f=events.filter(e=>e.date===calSel).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const lbl=document.getElementById('ev-day-lbl');if(lbl)lbl.textContent=`Eventos — ${calSel}`;
  if(!f.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">Sin eventos</div>';return;}
  const pc=['','g','a'];
  el.innerHTML=f.map((e,i)=>`<div class="evcard"><div class="evpill ${pc[i%3]}"></div><div style="flex:1"><div class="evtitle">${esc(e.title)}</div><div class="evtime">${e.date}${e.time?' · '+e.time:''}</div></div><button class="btn dg sm" style="padding:3px 7px" onclick="delEv('${e.id}')">×</button></div>`).join('');
}

async function addEvent(){
  const title=document.getElementById('ev-title').value.trim(),date=document.getElementById('ev-date').value.trim(),time=document.getElementById('ev-time').value.trim();
  if(!title||!date)return;
  const newEv={id:'e'+Date.now(),title,date,time,user_id:currentUser.id};
  await sb.from('events').insert(newEv);
  events.push(newEv);
  document.getElementById('ev-title').value='';document.getElementById('ev-time').value='';
  renderCal();updBadges();showToast('Evento agregado');
}

async function delEv(id){
  await sb.from('events').delete().eq('id',id).eq('user_id',currentUser.id);
  events=events.filter(e=>e.id!==id);renderCal();updBadges();showToast('Evento eliminado');
}

// ── TABLAS ──
function renderTbls(){
  const c=document.getElementById('tblcont');
  if(!tables.length){c.innerHTML='<div class="empty">Sin tablas.</div>';return;}
  c.innerHTML=tables.map((tbl,ti)=>`<div class="tblblock">
    <div class="tblhdr"><input class="tblname" value="${esc(tbl.name)}" onchange="updateTblName('${tbl.id}',this.value)"/><button class="btn sm dg" onclick="delTbl('${tbl.id}')">Eliminar</button></div>
    <div class="tblwrap"><table class="dt">
      <thead><tr>${(tbl.cols||[]).map(c=>`<th>${esc(c)}</th>`).join('')}<th style="width:32px"></th></tr></thead>
      <tbody>${(tbl.rows||[]).map((row,ri)=>`<tr>
        ${(tbl.cols||[]).map((c,ci)=>`<td><input type="text" value="${esc(row[ci]||'')}" onchange="updateTblCell('${tbl.id}',${ri},${ci},this.value)"/></td>`).join('')}
        <td><button class="btn dg sm" style="padding:2px 6px" onclick="delTblRow('${tbl.id}',${ri})">×</button></td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div class="tblfoot"><button class="btn sm" onclick="addTblRow('${tbl.id}')">+ Fila</button></div>
  </div>`).join('');
}

async function updateTblName(id,name){const tbl=tables.find(t=>t.id===id);if(!tbl)return;tbl.name=name;await sb.from('tables_data').update({name}).eq('id',id).eq('user_id',currentUser.id);}
async function updateTblCell(id,ri,ci,val){const tbl=tables.find(t=>t.id===id);if(!tbl)return;if(!tbl.rows[ri])tbl.rows[ri]=[];tbl.rows[ri][ci]=val;await sb.from('tables_data').update({rows:tbl.rows}).eq('id',id).eq('user_id',currentUser.id);}
async function addTblRow(id){const tbl=tables.find(t=>t.id===id);if(!tbl)return;tbl.rows=[...tbl.rows,[]];await sb.from('tables_data').update({rows:tbl.rows}).eq('id',id).eq('user_id',currentUser.id);renderTbls();}
async function delTblRow(id,ri){const tbl=tables.find(t=>t.id===id);if(!tbl)return;tbl.rows.splice(ri,1);await sb.from('tables_data').update({rows:tbl.rows}).eq('id',id).eq('user_id',currentUser.id);renderTbls();}
async function delTbl(id){if(!confirm('¿Eliminar?'))return;await sb.from('tables_data').delete().eq('id',id).eq('user_id',currentUser.id);tables=tables.filter(t=>t.id!==id);renderTbls();showToast('Tabla eliminada');}

async function createTbl(){
  const name=document.getElementById('tbl-name-in').value.trim()||'Nueva tabla';
  const cols=(document.getElementById('tbl-cols-in').value.trim()||'Col 1,Col 2,Col 3').split(',').map(c=>c.trim()).filter(Boolean);
  const newTbl={id:'tb'+Date.now(),name,cols,rows:[[]],user_id:currentUser.id};
  await sb.from('tables_data').insert(newTbl);
  tables.push(newTbl);closeMo('mo-tbl');
  document.getElementById('tbl-name-in').value='';document.getElementById('tbl-cols-in').value='';
  renderTbls();showToast('Tabla creada');
}

// ── UTILS ──
function openMo(id){document.getElementById(id).classList.add('open');}
function closeMo(id){document.getElementById(id).classList.remove('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.querySelectorAll('.mo').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
</script>
</body>
</html>
